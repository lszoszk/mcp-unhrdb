# /etc/nginx/conf.d/mcp_ratelimit.conf
#
# Independent rate-limit zone for MCP traffic to the UNHRDB API.
# Included automatically (nginx.conf: include /etc/nginx/conf.d/*.conf in http{}).
#
# The zone throttles per client IP, separately from the dashboard route
# (/unhrdb-api/) and the Ask route (/ask-api/). The token gate itself lives
# in the /unhrdb-mcp/ location block (a direct $http_x_api_key comparison),
# so there is no map here — avoids the map_hash_bucket_size tuning a long
# token key would otherwise force.
#
# THROTTLE: change `rate=` (and the location's `burst=`) -> reload.

limit_req_zone $binary_remote_addr zone=mcp_api:10m rate=60r/m;
