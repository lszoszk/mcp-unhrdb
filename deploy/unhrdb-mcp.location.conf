# Paste this location block INTO the existing `server { listen 443 ssl ... }`
# in /etc/nginx/sites-enabled/default, right AFTER the closing `}` of the
# `location /unhrdb-api/ { ... }` block (around line 191).
#
# It proxies to the SAME upstream as the dashboard (unhrdb_api -> :8002) but
# is gated by the X-API-Key token and has its own limit_req zone, so MCP
# traffic is throttled and revocable independently of the dashboard.

  # ---- UNHRDB MCP API (token-gated, independent rate limit) ----
  location /unhrdb-mcp/ {
    # Token gate. Direct header comparison (no map). `if` + `return` is a
    # safe use of `if` in nginx. REVOKE/ROTATE: change the token string here
    # and reload. To support multiple tokens, switch to a map keyed on
    # $http_x_api_key (then add `map_hash_bucket_size 128;` for long keys).
    if ($http_x_api_key != "YOUR_MCP_TOKEN_HERE") { return 401; }

    # Per-IP rate limit, separate zone from dashboard + ask routes.
    limit_req zone=mcp_api burst=20 nodelay;

    rewrite ^/unhrdb-mcp/(.*)$ /$1 break;
    proxy_pass http://unhrdb_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    gzip off;
  }
