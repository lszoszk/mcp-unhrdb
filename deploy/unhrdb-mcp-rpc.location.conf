# Paste this location block INTO the existing `server { listen 443 ssl ... }`
# in /etc/nginx/sites-enabled/default, near the other /unhrdb-* locations.
#
# Exposes the HTTP (Streamable HTTP) MCP server (container on 127.0.0.1:8004)
# at  https://<host>/unhrdb-mcp-rpc/mcp  — the URL to add as a remote
# connector (Cowork / claude.ai) or submit to the registry.
#
# Auth is handled in the app (MCP_AUTH_TOKEN → Authorization: Bearer), so
# this block only needs TLS termination + the shared rate-limit zone. The
# `proxy_buffering off` + long timeouts let the Streamable HTTP transport
# hold an SSE response stream open.

  # ---- UNHRDB MCP HTTP server (remote connector, Streamable HTTP) ----
  location /unhrdb-mcp-rpc/ {
    limit_req zone=mcp_api burst=20 nodelay;
    rewrite ^/unhrdb-mcp-rpc/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:8004;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
